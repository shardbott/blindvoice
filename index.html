<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlindVoice</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background-color: #0d0d0d; color: #ffffff;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header { padding: 20px; text-align: center; }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; }
        header span { color: #8a2be2; }
        .profile-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .avatar-blur {
            width: 150px; height: 150px; border-radius: 50%;
            background: linear-gradient(45deg, #8a2be2, #4b0082); filter: blur(8px);
            margin-bottom: 30px; box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
        }
        .audio-player {
            width: 100%; max-width: 300px; background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px; border-radius: 30px; display: flex; align-items: center; gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .play-btn {
            width: 40px; height: 40px; border-radius: 50%; background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; cursor: pointer;
        }
        .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 5px; position: relative; }
        .progress { width: 0%; height: 100%; background: #8a2be2; border-radius: 5px; }
        .action-buttons { padding: 30px 20px 50px 20px; display: flex; justify-content: space-evenly; align-items: center; }
        .btn {
            border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .btn:active { transform: scale(0.9); }
        .btn-skip { width: 60px; height: 60px; background: #2a2a2a; color: #ff4757; }
        .btn-super { width: 50px; height: 50px; background: #2a2a2a; color: #1e90ff; font-size: 22px; }
        .btn-like { width: 70px; height: 70px; background: linear-gradient(45deg, #ff4757, #ff6b81); color: #fff; }
        .info-txt { font-size: 12px; opacity: 0.5; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>Blind<span>Voice</span></h1>
        <div id="statusTxt" class="info-txt">Carregando fila...</div>
    </header>

    <div class="profile-container">
        <div class="avatar-blur" id="avatar animate"></div>
        <h2 id="perfilNome" style="margin-bottom: 5px; font-weight: 300; letter-spacing: 1px;">Buscando...</h2>
        <div id="perfilEstado" style="font-size: 14px; color: #8a2be2; margin-bottom: 20px;">--</div>
        
        <div class="audio-player">
            <button class="play-btn" id="btnPlay">▶</button>
            <div class="progress-bar"><div class="progress" id="audioProgress"></div></div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-skip" id="btnSkip">✖</button>
        <button class="btn btn-super" id="btnSuper">⭐</button>
        <button class="btn btn-like" id="btnLike">❤</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // ⚠️ IMPORTANTE: Substitua pelo seu link gerado pela SquareCloud!
        const API_BASE = 'https://blindvoice.squareweb.app/'; 
        const myTelegramId = tg.initDataUnsafe.user?.id || '8302642960'; // Fallback pro seu ID de testes

        let perfilAtual = null;
        let audioNode = new Audio();

        // Carrega um perfil da API sem fechar a tela
        async function carregarProximoPerfil() {
            try {
                audioNode.pause();
                document.getElementById('btnPlay').innerText = '▶';
                document.getElementById('audioProgress').style.width = '0%';

                const response = await fetch(`${API_BASE}/api/perfil/${myTelegramId}`);
                const data = await response.json();

                if (data.vazio) {
                    document.getElementById('perfilNome').innerText = "Fila Vazia 🏜️";
                    document.getElementById('perfilEstado').innerText = "Volte mais tarde!";
                    configurarBotoes(false);
                    return;
                }
                if (data.esgotado) {
                    document.getElementById('perfilNome').innerText = "Energia Esgotada 🔋";
                    document.getElementById('perfilEstado').innerText = "Convide amigos ou compre na loja!";
                    configurarBotoes(false);
                    return;
                }

                perfilAtual = data;
                document.getElementById('perfilNome').innerText = "Voz Misteriosa";
                document.getElementById('perfilEstado').innerText = `📍 Próximo de você (${data.estado})`;
                document.getElementById('statusTxt').innerText = `⚡ Energia: ${data.energiaRestante} | 🌟 Super Likes: ${data.superLikes}`;
                audioNode.src = data.audioUrl;
                configurarBotoes(true);

            } catch (err) {
                document.getElementById('perfilNome').innerText = "Erro de conexão";
            }
        }

        async function enviarAcao(tipoAcao) {
            if (!perfilAtual) return;
            try {
                const response = await fetch(`${API_BASE}/api/acao`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        myId: myTelegramId,
                        targetId: perfilAtual.id,
                        acao: tipoAcao
                    })
                });
                const data = await response.json();
                if (data.match) {
                    tg.showPopup({ title: '🔥 MATCH! 🔥', message: 'Vocês se curtiram! O chat foi aberto no Telegram.' });
                }
                carregarProximoPerfil(); // Carrega o próximo direto na tela!
            } catch (e) {}
        }

        // Controle do Player de Áudio nativo do HTML5
        document.getElementById('btnPlay').addEventListener('click', () => {
            if (audioNode.paused) {
                audioNode.play();
                document.getElementById('btnPlay').innerText = '⏸';
            } else {
                audioNode.pause();
                document.getElementById('btnPlay').innerText = '▶';
            }
        });

        audioNode.addEventListener('timeupdate', () => {
            const pct = (audioNode.currentTime / audioNode.duration) * 100;
            document.getElementById('audioProgress').style.width = `${pct}%`;
        });
        audioNode.addEventListener('ended', () => { document.getElementById('btnPlay').innerText = '▶'; });

        // Configuração dos cliques de ação
        document.getElementById('btnLike').addEventListener('click', () => { tg.HapticFeedback.impactOccurred('heavy'); enviarAcao('like'); });
        document.getElementById('btnSkip').addEventListener('click', () => { tg.HapticFeedback.impactOccurred('light'); enviarAcao('skip'); });
        document.getElementById('btnSuper').addEventListener('click', () => { tg.HapticFeedback.notificationOccurred('success'); enviarAcao('superlike'); });

        function configurarBotoes(ativo) {
            document.getElementById('btnLike').disabled = !ativo;
            document.getElementById('btnSkip').disabled = !ativo;
            document.getElementById('btnSuper').disabled = !ativo;
            document.getElementById('btnPlay').disabled = !ativo;
        }

        // Inicializa puxando o primeiro perfil da fila
        carregarProximoPerfil();
    </script>
</body>
</html>
