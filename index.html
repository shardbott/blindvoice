<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlindVoice</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Reset e Tema Escuro/Grunge Moderno */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            background-color: #0d0d0d; 
            color: #ffffff;
            /* Textura leve de fundo para dar uma vibe mais rústica/moderna */
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Evita rolagem da tela */
        }

        /* Cabeçalho */
        header { padding: 20px; text-align: center; }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        header span { color: #8a2be2; /* Toque Neon Roxo */ }

        /* Área Central (O Perfil) */
        .profile-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Círculo do Avatar (Borrado/Anônimo) */
        .avatar-blur {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(45deg, #8a2be2, #4b0082);
            filter: blur(8px);
            animation: pulse 2s infinite alternate;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.4);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            100% { transform: scale(1.05); opacity: 1; }
        }

        /* Player Falso (Apenas Visual por enquanto) */
        .audio-player {
            width: 100%;
            max-width: 300px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 20px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .play-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: none; cursor: pointer;
        }
        .progress-bar {
            flex: 1; height: 5px; background: rgba(255,255,255,0.2); border-radius: 5px;
            position: relative;
        }
        .progress { width: 30%; height: 100%; background: #8a2be2; border-radius: 5px; box-shadow: 0 0 10px #8a2be2; }

        /* Rodapé com Botões de Ação */
        .action-buttons {
            padding: 30px 20px 50px 20px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
        }
        .btn {
            border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 28px; cursor: pointer; transition: transform 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .btn:active { transform: scale(0.9); }
        
        .btn-skip { width: 60px; height: 60px; background: #2a2a2a; color: #ff4757; }
        .btn-super { width: 50px; height: 50px; background: #2a2a2a; color: #1e90ff; font-size: 22px; }
        .btn-like { width: 70px; height: 70px; background: linear-gradient(45deg, #ff4757, #ff6b81); color: #fff; }

        /* Ajustes baseados no tema do Telegram */
        body.tg-dark { background-color: var(--tg-theme-bg-color, #000); color: var(--tg-theme-text-color, #fff); }
    </style>
</head>
<body>

    <header>
        <h1>Blind<span>Voice</span></h1>
    </header>

    <div class="profile-container">
        <div class="avatar-blur"></div>
        <h2 style="margin-bottom: 20px; font-weight: 300; letter-spacing: 1px;">Voz Misteriosa</h2>
        
        <div class="audio-player">
            <button class="play-btn">▶</button>
            <div class="progress-bar"><div class="progress"></div></div>
            <span style="font-size: 12px; opacity: 0.7;">00:00</span>
        </div>
    </div>

    <div class="action-buttons">
        <button class="btn btn-skip" id="btnSkip">✖</button>
        <button class="btn btn-super" id="btnSuper">⭐</button>
        <button class="btn btn-like" id="btnLike">❤</button>
    </div>

    <script>
        // Inicializa o Web App do Telegram
        const tg = window.Telegram.WebApp;
        
        // Expande o app para ocupar a tela inteira (Formato Story 9:16)
        tg.expand();
        
        // Informa que o app está pronto para ser exibido
        tg.ready();

        // Adiciona classe baseada no tema do usuário (Claro/Escuro)
        if (tg.colorScheme === 'dark') { document.body.classList.add('tg-dark'); }

        // Ações dos botões (Por enquanto apenas fecham o app dando um alerta visual)
        document.getElementById('btnLike').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('heavy'); // Vibração do celular
            tg.sendData("action_like"); // Envia o dado invisível para a SquareCloud
        });

        document.getElementById('btnSkip').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('light');
            tg.sendData("action_skip");
        });

        document.getElementById('btnSuper').addEventListener('click', () => {
            tg.HapticFeedback.notificationOccurred('success');
            tg.sendData("action_superlike");
        });
    </script>
</body>
</html>
